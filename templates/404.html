{% extends "base.html" %}

{% block title %}404 - Page Not Found{% endblock %}

{% block content %}
<section class="error-page">
    <div class="container text-center">
        <div class="error-code">404</div>
        <h1 class="mt-4">Page Not Found</h1>
        <p class="lead" style="color: var(--text-secondary); max-width: 500px; margin: 1rem auto 2rem;">
            Oops! The page you're looking for doesn't exist or has been moved.
        </p>
        <div class="d-flex gap-3 justify-content-center flex-wrap">
            <a href="{{ url_for('index') }}" class="btn btn-primary-custom">
                <i class="fas fa-home me-2"></i>Go Home
            </a>
            <a href="{{ url_for('projects_list') }}" class="btn btn-outline-custom">
                <i class="fas fa-folder-open me-2"></i>View Projects
            </a>
        </div>
    </div>
</section>
{% endblock %}
